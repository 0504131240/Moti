<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}

<script type="module">
// Firebase loaded asynchronously so app always renders even if Firebase fails
const FB_CFG={apiKey:"AIzaSyDU4O_IGPDLc7VkHR5ZvRbLzU6HKSa1C_E",authDomain:"moti1-848e7.firebaseapp.com",projectId:"moti1-848e7",storageBucket:"moti1-848e7.firebasestorage.app",messagingSenderId:"177637818983",appId:"1:177637818983:web:4830fff93f2dfa6746cac2"};
let db=null,unsubFire=null,_doc=null,_setDoc=null,_onSnapshot=null,_getDoc=null;
let USERS=[],CUR_UID='u1';
function loadUsers(){
  try{const u=localStorage.getItem('bdg_users');if(u){USERS=JSON.parse(u);}else{USERS=[{id:'u1',name:'משתמש 1'}];saveUsers();}}catch{USERS=[{id:'u1',name:'משתמש 1'}];}
  try{CUR_UID=localStorage.getItem('bdg_cur_user')||'u1';}catch{CUR_UID='u1';}
  if(!USERS.find(u=>u.id===CUR_UID)){CUR_UID=USERS[0]?.id||'u1';}
}
function saveUsers(){
  try{localStorage.setItem('bdg_users',JSON.stringify(USERS));}catch{}
  try{localStorage.setItem('bdg_cur_user',CUR_UID);}catch{}
  fbSaveUsers();
}

function fbSaveUsers(){
  if(!db||!_setDoc||!_doc)return;
  _setDoc(_doc(db,'budget','_users'),{users:USERS}).catch(e=>console.warn('FB users save:',e));
}
function fbLoadUsers(){
  if(!db||!_getDoc||!_doc)return;
  _getDoc(_doc(db,'budget','_users')).then(snap=>{
    if(!snap.exists())return;
    const fbUsers=snap.data().users||[];
    let changed=false;
    fbUsers.forEach(fu=>{if(!USERS.find(u=>u.id===fu.id)){USERS.push(fu);changed=true;}});
    if(changed){saveUsers();rHdr();if(g('uO'))rUserMod();}
  }).catch(e=>console.warn('FB users load:',e));
}
function fbSave(){
  if(!db||!_setDoc||!_doc)return;
  _setDoc(_doc(db,'budget',CUR_UID+'_'+String(S.year)),{cats:S.cats,mData:S.mData}).catch(e=>console.warn('FB save:',e));
}
function fbListen(year){
  if(!db||!_onSnapshot||!_doc){return;}
  if(unsubFire)unsubFire();
  unsubFire=_onSnapshot(_doc(db,'budget',CUR_UID+'_'+String(year)),snap=>{
    if(!snap.exists())return;
    const d=snap.data();
    S.cats=d.cats||DF.map(c=>({...c}));
    S.mData=d.mData||iMD(S.cats);
    eC(S.cats,S.mData);
    try{localStorage.setItem(sk(year),JSON.stringify({cats:S.cats,mData:S.mData}));}catch{}
    const open=['m1','m2','m3'].some(id=>{const el=g(id);return el&&el.innerHTML.trim();});
    if(!open)rAll();
    setSyncDot(true);
  },e=>{console.warn('FB listen:',e);setSyncDot(false);});
}
function setSyncDot(ok){const el=g('syncDot');if(el)el.style.background=ok?'#10b981':'#ef4444';}

const MO=["ינואר","פברואר","מרץ","אפריל","מאי","יוני","יולי","אוגוסט","ספטמבר","אוקטובר","נובמבר","דצמבר"];
const CL=["#6366f1","#0ea5e9","#f59e0b","#10b981","#8b5cf6","#ef4444","#f97316","#14b8a6","#ec4899","#84cc16"];
const DF=[
  {id:1,name:"מזון וקניות",budget:3000,color:"#6366f1"},
  {id:2,name:"חשבונות ותשלומים",budget:2000,color:"#0ea5e9"},
  {id:3,name:"תחבורה",budget:1000,color:"#f59e0b"},
  {id:4,name:"בריאות",budget:800,color:"#10b981"},
  {id:5,name:"חינוך",budget:1500,color:"#8b5cf6"},
];

let S={year:new Date().getFullYear(),month:new Date().getMonth(),view:"monthly",cats:[],mData:{},aCat:null,eCat:null,nc:{name:"",budget:"",color:"#6366f1",isRec:false},sortEnt:"date",editEntId:null,expFilter:"variable",chartIdx:0};
let deferredPrompt=null,touchStartX=0,touchStartY=0,touchStartTarget=null;

function sk(y){return"bdg_v4_"+CUR_UID+"_"+y;}
function iMD(c){const m={};for(let i=0;i<12;i++){m[i]={income:[]};c.forEach(x=>{m[i][x.id]={entries:[]};});}return m;}
function eC(c,m){for(let i=0;i<12;i++){if(!m[i])m[i]={income:[]};if(!m[i].income)m[i].income=[];c.forEach(x=>{if(!m[i][x.id])m[i][x.id]={entries:[]};});}return m;}
function ld(){
  if(CUR_UID==='u1'){try{const nk=sk(S.year),ok="bdg_v4_"+S.year;if(!localStorage.getItem(nk)&&localStorage.getItem(ok)){localStorage.setItem(nk,localStorage.getItem(ok));}}catch{}}
  try{
    let r=localStorage.getItem(sk(S.year));if(!r)r=localStorage.getItem("bdg_v3_"+S.year);
    if(r){const s=JSON.parse(r);S.cats=s.cats||DF.map(c=>({...c}));S.mData=s.mData||iMD(S.cats);eC(S.cats,S.mData);}
    else{
      let inh=false;
      try{
        const pr=localStorage.getItem(sk(S.year-1))||localStorage.getItem("bdg_v3_"+(S.year-1));
        if(pr){
          const ps=JSON.parse(pr);
          S.cats=(ps.cats||DF.map(c=>({...c}))).map(c=>({...c}));
          S.mData=iMD(S.cats);
          const pm=ps.mData||{};
          S.cats.forEach(cat=>{
            const seen=new Set();
            for(let m=0;m<12;m++){(pm[m]?.[cat.id]?.entries||[]).filter(e=>e.recurring).forEach(e=>{const bid=e.id-m*1000;if(!seen.has(bid)){seen.add(bid);for(let nm=0;nm<12;nm++){if(S.mData[nm]?.[cat.id])S.mData[nm][cat.id].entries.push({id:bid+nm*1000,desc:e.desc,amount:e.amount,date:adjDate(e.date,nm,S.year),recurring:true,subCat:e.subCat||null});}}});}
          });
          sv();inh=true;
        }
      }catch{}
      if(!inh){S.cats=DF.map(c=>({...c}));S.mData=iMD(S.cats);}
    }
  }catch{S.cats=DF.map(c=>({...c}));S.mData=iMD(S.cats);}
}
function sv(){
  try{localStorage.setItem(sk(S.year),JSON.stringify({cats:S.cats,mData:S.mData}));}catch{}
  fbSave();
}
function fm(n){return Number(n||0).toLocaleString("he-IL");}
function today(){return new Date().toISOString().split("T")[0];}
function fmDate(d){if(!d)return"";try{const p=d.split("-");return p[2]+"/"+p[1];}catch{return d;}}
function ct(mo,id){return(S.mData[mo]?.[id]?.entries||[]).reduce((s,e)=>s+(parseFloat(e.amount)||0),0);}
function mt(mo){return S.cats.reduce((s,c)=>s+ct(mo,c.id),0);}
function cyt(id){let t=0;for(let m=0;m<12;m++)t+=ct(m,id);return t;}
function gt(){return S.cats.reduce((s,c)=>s+cyt(c.id),0);}
function incT(mo){return(S.mData[mo]?.income||[]).reduce((s,e)=>s+(parseFloat(e.amount)||0),0);}
function g(id){return document.getElementById(id);}
function ih(id,h){const e=g(id);if(e)e.innerHTML=h;}

function adjDate(dateStr,month,year){
  if(!dateStr)return today();
  const p=dateStr.split('-');
  const y=year||parseInt(p[0]);
  const day=parseInt(p[2]);
  const lastDay=new Date(y,month+1,0).getDate();
  return String(y)+'-'+String(month+1).padStart(2,'0')+'-'+String(Math.min(day,lastDay)).padStart(2,'0');
}

function applyToFutureYears(baseId,catId,fn){
  for(let fy=S.year+1;fy<=S.year+10;fy++){
    try{
      const fr=localStorage.getItem(sk(fy));if(!fr)continue;
      const fd=JSON.parse(fr);let chg=false;
      for(let m=0;m<12;m++){
        if(fd.mData?.[m]?.[catId]){
          const r=fn(fd.mData[m][catId].entries,baseId+m*1000,m,fy);
          if(r!==undefined){fd.mData[m][catId].entries=r;chg=true;}
        }
      }
      if(chg)localStorage.setItem(sk(fy),JSON.stringify(fd));
    }catch{}
  }
}

function trendHTML(catId){
  const curr=ct(S.month,catId),prev=ct((S.month-1+12)%12,catId);
  if(!prev||!curr)return"";
  const pct=Math.round(((curr-prev)/prev)*100);
  if(pct>5)return`<span style="font-size:10px;color:#ef4444">&#9650;${pct}%</span>`;
  if(pct<-5)return`<span style="font-size:10px;color:#10b981">&#9660;${Math.abs(pct)}%</span>`;
  return`<span style="font-size:10px;color:#94a3b8">&rarr;</span>`;
}

function rPie(){
  const total=mt(S.month);
  if(!total)return"";
  const slices=S.cats.map(cat=>({cat,val:ct(S.month,cat.id)})).filter(s=>s.val>0);
  if(!slices.length)return"";
  let angle=-Math.PI/2,paths="",legend="";
  const r=52,cx=62,cy=62;
  slices.forEach(s=>{
    const pct=s.val/total,sa=angle;
    angle+=pct*2*Math.PI;
    if(pct>0.999){paths+=`<circle cx="${cx}" cy="${cy}" r="${r}" fill="${s.cat.color}"/>`;}
    else{const x1=(cx+r*Math.cos(sa)).toFixed(1),y1=(cy+r*Math.sin(sa)).toFixed(1),x2=(cx+r*Math.cos(angle)).toFixed(1),y2=(cy+r*Math.sin(angle)).toFixed(1);paths+=`<path d="M${cx},${cy} L${x1},${y1} A${r},${r} 0 ${pct>0.5?1:0},1 ${x2},${y2} Z" fill="${s.cat.color}"/>`;}
    legend+=`<div style="display:flex;align-items:center;gap:4px"><div style="width:7px;height:7px;border-radius:50%;background:${s.cat.color};flex-shrink:0"></div><span style="font-size:10px;color:#64748b">${s.cat.name}</span><span style="font-size:10px;font-weight:700;color:#1e293b">${Math.round(pct*100)}%</span></div>`;
  });
  return`<div style="background:#faf5ff;border-radius:14px;padding:14px 16px;border:1px solid #ddd6fe">
    <div style="font-size:12px;color:#6366f1;font-weight:700;margin-bottom:10px">&#128202; פילוח הוצאות</div>
    <div style="display:flex;align-items:center;gap:14px;flex-wrap:wrap">
      <svg viewBox="0 0 124 124" width="100" height="100" style="flex-shrink:0">${paths}</svg>
      <div style="display:flex;flex-direction:column;gap:5px">${legend}</div>
    </div>
  </div>`;
}

function rLineChart(){
  const vals=Array.from({length:12},(_,m)=>mt(m));
  const max=Math.max(...vals,1);
  const W=300,H=110,px=10,py=8,bh=16,iw=280,ih=H-py-bh;
  const pts=vals.map((v,i)=>{const x=px+(11-i)*(iw/11);const y=py+ih-(v/max)*ih;return[x,y];});
  const line=pts.map(p=>p.join(',')).join(' ');
  const area=`${W-px},${py+ih} ${line} ${px},${py+ih}`;
  const [cx,cy]=pts[S.month];
  const lbls=MO.map((m,i)=>{const[x]=pts[i];return`<text x="${x.toFixed(1)}" y="${H-2}" text-anchor="middle" font-size="8" fill="${i===S.month?'#6366f1':'#94a3b8'}">${m[0]}</text>`;}).join('');
  const dots=pts.map(([x,y],i)=>`<circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="${i===S.month?5:2.5}" fill="${i===S.month?'#6366f1':'#8b5cf6'}" stroke="#fff" stroke-width="1.5"/>`).join('');
  const tip=vals[S.month]?`<text x="${cx.toFixed(1)}" y="${(cy-9).toFixed(1)}" text-anchor="middle" font-size="9" font-weight="700" fill="#6366f1">&#8362;${fm(vals[S.month])}</text>`:'';
  return`<div style="background:#faf5ff;border-radius:14px;padding:10px 12px;border:1px solid #ddd6fe">
    <div style="font-size:12px;color:#6366f1;font-weight:700;margin-bottom:8px">&#128200; מגמת הוצאות שנתית</div>
    <svg viewBox="0 0 ${W} ${H}" width="100%" height="${H}" style="display:block">
      <defs><linearGradient id="lgA" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#6366f1" stop-opacity=".25"/><stop offset="100%" stop-color="#6366f1" stop-opacity="0"/></linearGradient></defs>
      <polygon points="${area}" fill="url(#lgA)"/>
      <polyline points="${line}" fill="none" stroke="#6366f1" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>
      ${dots}${tip}${lbls}
    </svg>
  </div>`;
}
function rStackedBar(){
  const W=300,H=110,px=6,py=8,bh=16,iw=288,ih=H-py-bh;
  const max=Math.max(...Array.from({length:12},(_,m)=>mt(m)),1);
  const slot=iw/12,bw=slot-3;
  const bars=Array.from({length:12},(_,m)=>{const x=px+m*slot+1.5;let y=py+ih;return S.cats.map(cat=>{const v=ct(m,cat.id);if(!v)return'';const h=(v/max)*ih;y-=h;return`<rect x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="${bw.toFixed(1)}" height="${h.toFixed(1)}" fill="${cat.color}" rx="1" opacity="${m===S.month?1:.65}"/>`;}).join('');}).join('');
  const lbls=MO.map((mo,i)=>`<text x="${(px+i*slot+slot/2).toFixed(1)}" y="${H-2}" text-anchor="middle" font-size="8" fill="${i===S.month?'#6366f1':'#94a3b8'}">${mo[0]}</text>`).join('');
  const legend=S.cats.map(cat=>`<div style="display:flex;align-items:center;gap:3px"><div style="width:6px;height:6px;border-radius:2px;background:${cat.color}"></div><span style="font-size:9px;color:#64748b">${cat.name}</span></div>`).join('');
  return`<div style="background:#faf5ff;border-radius:14px;padding:14px 16px;border:1px solid #ddd6fe">
    <div style="font-size:12px;color:#6366f1;font-weight:700;margin-bottom:8px">&#128293; הוצאות לפי חודש</div>
    <svg viewBox="0 0 ${W} ${H}" width="100%" height="${H}" style="display:block">
      <rect x="${(px+S.month*slot).toFixed(1)}" y="${py}" width="${slot.toFixed(1)}" height="${ih}" fill="#6366f1" rx="2" opacity=".08"/>
      ${bars}${lbls}
    </svg>
    <div style="display:flex;flex-wrap:wrap;gap:5px;margin-top:6px">${legend}</div>
  </div>`;
}
function rSparklines(){
  const idxs=Array.from({length:6},(_,i)=>(S.month-5+i+12)%12);
  const items=S.cats.map(cat=>{
    const vals=idxs.map(m=>ct(m,cat.id));
    const max=Math.max(...vals,1);
    const W=80,H=30;
    const pts=vals.map((v,i)=>`${(4+i*14).toFixed(0)},${(H-4-(v/max)*(H-8)).toFixed(1)}`).join(' ');
    const curr=vals[5],prev=vals[4];
    let tr='';
    if(prev&&curr){const p=Math.round(((curr-prev)/prev)*100);if(p>5)tr=`<span style="font-size:9px;color:#ef4444">&#9650;${p}%</span>`;else if(p<-5)tr=`<span style="font-size:9px;color:#10b981">&#9660;${Math.abs(p)}%</span>`;}
    return`<div style="background:#fff;border-radius:8px;padding:6px 7px 5px;border:1px solid #e2e8f0">
      <div style="display:flex;align-items:center;gap:3px;margin-bottom:3px">
        <div style="width:5px;height:5px;border-radius:50%;background:${cat.color};flex-shrink:0"></div>
        <span style="font-size:10px;font-weight:700;color:#1e293b;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${cat.name}</span>${tr}
      </div>
      <svg viewBox="0 0 ${W} ${H}" width="100%" height="${H}" style="display:block">
        <polyline points="${pts}" fill="none" stroke="${cat.color}" stroke-width="1.5" stroke-linejoin="round"/>
        ${vals.map((v,i)=>`<circle cx="${(4+i*14).toFixed(0)}" cy="${(H-4-(v/max)*(H-8)).toFixed(1)}" r="${i===5?2.5:1.5}" fill="${cat.color}"/>`).join('')}
      </svg>
      <div style="font-size:10px;font-weight:800;color:#6366f1;text-align:center;margin-top:2px">&#8362;${fm(curr)}</div>
    </div>`;
  }).join('');
  return`<div style="background:#faf5ff;border-radius:14px;padding:10px 12px;border:1px solid #ddd6fe">
    <div style="font-size:11px;color:#6366f1;font-weight:700;margin-bottom:8px">&#10024; מגמות 6 חודשים</div>
    <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:6px">${items}</div>
  </div>`;
}
function rIncVsExp(){
  const idxs=Array.from({length:6},(_,i)=>(S.month-i+12)%12);
  const iv=idxs.map(m=>incT(m)),ev=idxs.map(m=>mt(m));
  const max=Math.max(...iv,...ev,1);
  const W=300,H=110,px=6,py=8,bh=16,iw=288,ih=H-py-bh;
  const slot=iw/6,bw=(slot-6)/2;
  const bars=idxs.map((m,i)=>{const x=px+i*slot;const h1=(iv[i]/max)*ih,h2=(ev[i]/max)*ih;return`<rect x="${(x+1).toFixed(1)}" y="${(py+ih-h1).toFixed(1)}" width="${bw.toFixed(1)}" height="${h1.toFixed(1)}" fill="#10b981" rx="2" opacity="${m===S.month?1:.7}"/><rect x="${(x+bw+4).toFixed(1)}" y="${(py+ih-h2).toFixed(1)}" width="${bw.toFixed(1)}" height="${h2.toFixed(1)}" fill="#6366f1" rx="2" opacity="${m===S.month?1:.7}"/>`;}).join('');
  const lbls=idxs.map((m,i)=>`<text x="${(px+i*slot+slot/2).toFixed(1)}" y="${H-2}" text-anchor="middle" font-size="9" fill="${m===S.month?'#6366f1':'#94a3b8'}">${MO[m].substring(0,3)}</text>`).join('');
  return`<div style="background:#faf5ff;border-radius:14px;padding:10px 12px;border:1px solid #ddd6fe">
    <div style="font-size:12px;color:#6366f1;font-weight:700;margin-bottom:8px">&#128176; הכנסות מול הוצאות</div>
    <svg viewBox="0 0 ${W} ${H}" width="100%" height="${H}" style="display:block">${bars}${lbls}</svg>
    <div style="display:flex;gap:12px;justify-content:center;margin-top:6px">
      <div style="display:flex;align-items:center;gap:4px"><div style="width:10px;height:10px;border-radius:2px;background:#10b981"></div><span style="font-size:10px;color:#64748b">הכנסה</span></div>
      <div style="display:flex;align-items:center;gap:4px"><div style="width:10px;height:10px;border-radius:2px;background:#6366f1"></div><span style="font-size:10px;color:#64748b">הוצאה</span></div>
    </div>
  </div>`;
}

function rCnt(){S.view==="monthly"?rMon():rYr();}

function rMon(){
  const nowM=new Date().getMonth(),nowY=new Date().getFullYear();
  const isNow=S.month===nowM&&S.year===nowY;
  const filt=S.expFilter||'all';

  const monNav=`<div style="display:flex;align-items:center;justify-content:space-between;margin:12px 0;background:#fff;border-radius:14px;padding:12px 16px;border:1px solid #e2e8f0;box-shadow:0 1px 4px rgba(0,0,0,.05)">
    <button id="prevMon" style="background:#f1f5f9;border:none;border-radius:10px;width:40px;height:40px;font-size:22px;color:#64748b;cursor:pointer">&#8249;</button>
    <div style="text-align:center;flex:1">
      <div style="font-size:22px;font-weight:800;color:#1e293b">${MO[S.month]}</div>
      <div style="font-size:11px;color:#94a3b8">${S.year}</div>
    </div>
    <div style="display:flex;align-items:center;gap:8px">
      ${!isNow?'<button id="todayBtn" style="padding:6px 12px;border-radius:8px;border:none;background:#eef2ff;color:#6366f1;font-size:12px;font-weight:700;cursor:pointer">&#8617; היום</button>':''}
      <button id="nextMon" style="background:#f1f5f9;border:none;border-radius:10px;width:40px;height:40px;font-size:22px;color:#64748b;cursor:pointer">&#8250;</button>
    </div>
  </div>`;

  const inc=incT(S.month),expTotal=mt(S.month),balance=inc-expTotal;
  const incomeSec=`<div style="background:#f0fdf4;border-radius:14px;padding:14px 16px;margin-bottom:14px;border:1px solid #a7f3d0">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
      <div style="font-size:12px;color:#059669;font-weight:700">&#128176; הכנסות חודשיות</div>
      <button id="addInc" style="padding:4px 10px;border-radius:8px;border:none;color:#fff;font-size:12px;background:linear-gradient(135deg,#10b981,#059669);cursor:pointer">+ הוסף</button>
    </div>
    <div style="display:flex;gap:10px">
      <div style="flex:1;text-align:center"><div style="font-size:10px;color:#64748b">הכנסה</div><div style="font-size:16px;font-weight:700;color:#059669">&#8362;${fm(inc)}</div></div>
      <div style="flex:1;text-align:center"><div style="font-size:10px;color:#64748b">הוצאה</div><div style="font-size:16px;font-weight:700;color:#6366f1">&#8362;${fm(expTotal)}</div></div>
      <div style="flex:1;text-align:center"><div style="font-size:10px;color:#64748b">מאזן</div><div style="font-size:16px;font-weight:700;color:${balance>=0?'#059669':'#ef4444'}">${balance<0?fm(Math.abs(balance))+'-&#8362;':'&#8362;'+fm(balance)}</div></div>
    </div>
  </div>`;

  // Filter buttons
  const filtLabels={all:'הכל',recurring:'&#128260; קבועות',variable:'&#128200; משתנות'};
  const filtBtns=`<div style="display:flex;gap:6px;margin-bottom:14px">
    ${['variable','all','recurring'].map(f=>{
      const sel=filt===f;
      return`<button class="fBtn" data-f="${f}" style="flex:1;padding:8px 4px;border-radius:10px;border:2px solid ${sel?'#6366f1':'#e2e8f0'};background:${sel?'#eef2ff':'#fff'};color:${sel?'#6366f1':'#64748b'};font-size:12px;font-weight:${sel?700:400};cursor:pointer">${filtLabels[f]}</button>`;
    }).join('')}
  </div>`;

  // Cards with filter applied
  const visCats=filt==='variable'?S.cats.filter(c=>!c.isRecurring):filt==='recurring'?S.cats.filter(c=>c.isRecurring||(S.mData[S.month]?.[c.id]?.entries||[]).some(e=>e.recurring)):S.cats;
  const cards=visCats.map(cat=>{
    const allEnt=S.mData[S.month]?.[cat.id]?.entries||[];
    const ent=filt==='all'?allEnt:filt==='recurring'?allEnt.filter(e=>e.recurring):allEnt.filter(e=>!e.recurring);
    const tot=ent.reduce((s,e)=>s+(parseFloat(e.amount)||0),0);
    const variableTot=allEnt.filter(e=>!e.recurring).reduce((s,e)=>s+(parseFloat(e.amount)||0),0);
    const rem=cat.budget-variableTot;
    const ov=variableTot>cat.budget&&cat.budget>0;
    const pct=cat.budget>0?Math.min((variableTot/cat.budget)*100,100):0;
    const recCount=allEnt.filter(e=>e.recurring).length;
    const tr=trendHTML(cat.id);
    return`<div style="background:#fff;border-radius:14px;padding:14px 16px;border:1px solid ${ov?'#fca5a5':'#e2e8f0'};box-shadow:0 1px 4px rgba(0,0,0,.05)">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
        <div class="oE" data-c="${cat.id}" style="display:flex;align-items:center;gap:6px;cursor:pointer;flex:1">
          <div style="width:8px;height:8px;border-radius:50%;background:${cat.color};flex-shrink:0"></div>
          <span style="font-weight:700;font-size:14px;color:#1e293b">${cat.name}</span>
          ${allEnt.length>0?`<span style="font-size:11px;background:#f1f5f9;color:#64748b;border-radius:8px;padding:1px 6px">${ent.length}${filt!=='all'?'/'+allEnt.length:''}</span>`:""}
          ${cat.isRecurring?`<span style="font-size:11px;background:#eef2ff;color:#6366f1;border-radius:8px;padding:1px 6px">&#128260; קבועה</span>`:""}${recCount>0&&!cat.isRecurring?`<span style="font-size:11px;background:#eef2ff;color:#6366f1;border-radius:8px;padding:1px 6px">&#128260;${recCount}</span>`:""}
          ${tr}
        </div>
        <div style="display:flex;align-items:center;gap:3px">
          <span style="font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px;background:${ov?'#fee2e2':'#dcfce7'};color:${ov?'#b91c1c':'#15803d'};border:1px solid ${ov?'#fca5a5':'#86efac'}">${ov?'חרגת ':''}תקציב: &#8362;${cat.budget}</span>
          <button class="eC" data-c="${cat.id}" style="background:transparent;border:none;cursor:pointer;font-size:14px;padding:3px 5px;color:#94a3b8">&#9998;</button>
          <button class="dC" data-c="${cat.id}" style="background:transparent;border:none;cursor:pointer;font-size:16px;padding:3px 5px;color:#94a3b8">&times;</button>
        </div>
      </div>
      <div style="height:5px;background:#f1f5f9;border-radius:3px;margin-bottom:8px;overflow:hidden"><div style="height:100%;width:${pct}%;background:${pct>=100?'#ef4444':pct>=85?'#f97316':'#10b981'};border-radius:3px"></div></div>
      <div style="display:flex;justify-content:space-around">
        <div style="text-align:center"><div style="font-size:10px;color:#94a3b8">הוצאה</div><div style="font-size:16px;font-weight:700;color:${ov?'#ef4444':'#6366f1'}">&#8362;${fm(tot)}</div></div>
        <div style="text-align:center"><div style="font-size:10px;color:#94a3b8">יתרה</div><div style="font-size:16px;font-weight:700;color:${rem<0?'#ef4444':'#10b981'}">${rem<0?fm(Math.abs(rem))+'-&#8362;':'&#8362;'+fm(rem)}</div></div>
        <div style="text-align:center"><div style="font-size:10px;color:#94a3b8">פריטים</div><div style="font-size:16px;font-weight:700;color:#94a3b8">${ent.length}</div></div>
      </div>
    </div>`;
  }).join("");

  // Summary total based on filter
  const filtTotal=filt==='all'?expTotal:visCats.reduce((s,c)=>{
    const e=S.mData[S.month]?.[c.id]?.entries||[];
    const fe=filt==='recurring'?e.filter(x=>x.recurring):e.filter(x=>!x.recurring);
    return s+fe.reduce((ss,x)=>ss+(parseFloat(x.amount)||0),0);
  },0);
  const filtLabel=filt==='all'?'הוצאות':filt==='recurring'?'קבועות':'משתנות';

  ih("cnt",`
    ${monNav}
    ${incomeSec}
    ${rCharts()}
    <div style="background:#fff;border-radius:12px;padding:10px 14px;margin-bottom:12px;border:1px solid #e2e8f0;display:flex;justify-content:space-between;align-items:center">
      <span style="color:#64748b;font-size:13px">סה&quot;כ ${filtLabel} ${MO[S.month]}</span>
      <span style="font-size:20px;font-weight:800;color:#6366f1">&#8362;${fm(filtTotal)}</span>
    </div>
    <button id="addExpBtn" style="width:100%;padding:13px;border-radius:14px;border:2px dashed #c7d2fe;background:#eef2ff;color:#6366f1;font-weight:700;font-size:14px;cursor:pointer;margin-bottom:10px">&#10010; הוצאה חדשה</button>
    ${filtBtns}
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:10px">${cards}</div>
  `);

  g("prevMon").onclick=()=>{if(S.month===0){S.month=11;S.year--;ld();fbListen(S.year);}else{S.month--;}rAll();};
  g("nextMon").onclick=()=>{if(S.month===11){S.month=0;S.year++;ld();fbListen(S.year);}else{S.month++;}rAll();};
  if(!isNow&&g("todayBtn"))g("todayBtn").onclick=()=>{S.month=nowM;S.year=nowY;ld();fbListen(S.year);rAll();};
  document.querySelectorAll(".fBtn").forEach(b=>b.onclick=()=>{S.expFilter=b.dataset.f;rMon();});
  document.querySelectorAll(".chartDot").forEach(b=>b.onclick=()=>{S.chartIdx=parseInt(b.dataset.i);rMon();});
  const cc=g("chartCarousel");
  if(cc){let _cx=0,_cy=0;cc.addEventListener("touchstart",e=>{_cx=e.touches[0].clientX;_cy=e.touches[0].clientY;},{passive:true});cc.addEventListener("touchend",e=>{const dx=_cx-e.changedTouches[0].clientX,dy=Math.abs(_cy-e.changedTouches[0].clientY);if(Math.abs(dx)>40&&dy<80){if(dx>0)S.chartIdx=Math.max(S.chartIdx-1,0);else S.chartIdx=Math.min(S.chartIdx+1,3);rMon();}},{passive:true});}
  requestAnimationFrame(()=>{const carousel=g("chartCarousel"),track=g("chartTrack");if(carousel&&track&&track.children[S.chartIdx])carousel.style.height=track.children[S.chartIdx].scrollHeight+'px';});
  document.querySelectorAll(".oE").forEach(b=>b.onclick=()=>{S.aCat=parseInt(b.dataset.c);S.editEntId=null;rEntMod();});
  document.querySelectorAll(".eC").forEach(b=>b.onclick=e=>{e.stopPropagation();S.eCat={...S.cats.find(c=>c.id===parseInt(b.dataset.c))};rEditMod();});
  document.querySelectorAll(".dC").forEach(b=>b.onclick=e=>{e.stopPropagation();if(confirm("למחוק?")){S.cats=S.cats.filter(c=>c.id!==parseInt(b.dataset.c));sv();rMon();}});
  g("addInc").onclick=()=>rIncMod();
  g("addExpBtn").onclick=()=>rExpMod();
}

function rExpMod(){
  let selCat=S.cats[0]?.id||null;
  let selSub=null;
  let _desc='',_amt='',_date=today(),_rec=false,_inst=1;
  function build(){
    const catBtns=S.cats.map(cat=>{
      const sel=selCat===cat.id;
      return`<button class="expCat" data-c="${cat.id}" style="padding:9px 12px;border-radius:11px;border:2px solid ${sel?cat.color:'#e2e8f0'};background:${sel?cat.color+'18':'#fff'};cursor:pointer;display:flex;align-items:center;gap:7px;flex:1 0 130px;min-width:0">
        <div style="width:9px;height:9px;border-radius:50%;background:${cat.color};flex-shrink:0"></div>
        <span style="font-size:12px;font-weight:${sel?700:400};color:${sel?cat.color:'#64748b'};overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${cat.name}</span>
      </button>`;
    }).join("");
    const selCatObj=S.cats.find(c=>c.id===selCat);
    const subBtns=selCatObj?.subs?.length?`<div style="font-size:11px;font-weight:600;color:#94a3b8;margin-bottom:7px;letter-spacing:.5px">תת-קטגוריה</div><div style="display:flex;flex-wrap:wrap;gap:5px;margin-bottom:16px">${selCatObj.subs.map(sub=>{const sel=selSub===sub.id;return`<button class="expSub" data-s="${sub.id}" style="padding:6px 12px;border-radius:9px;border:2px solid ${sel?selCatObj.color:'#e2e8f0'};background:${sel?selCatObj.color+'18':'#fff'};cursor:pointer;font-size:12px;font-weight:${sel?700:400};color:${sel?selCatObj.color:'#64748b'}">${sub.name}</button>`;}).join('')}</div>`:'';
    ih("m1",`<div class="overlay" id="expO"><div class="modal">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:18px">
        <div>
          <div style="font-size:17px;font-weight:800;color:#1e293b">הוצאה חדשה</div>
          <div style="font-size:11px;color:#94a3b8">${MO[S.month]} ${S.year}</div>
        </div>
        <button id="cExp" style="background:#f1f5f9;border:none;border-radius:50%;width:32px;height:32px;cursor:pointer;font-size:18px;color:#64748b">&times;</button>
      </div>
      <div style="font-size:11px;font-weight:600;color:#94a3b8;margin-bottom:7px;letter-spacing:.5px">קטגוריה</div>
      <div style="display:flex;flex-wrap:wrap;gap:5px;margin-bottom:16px">${catBtns}</div>
      ${subBtns}
      <div style="font-size:11px;font-weight:600;color:#94a3b8;margin-bottom:5px;letter-spacing:.5px">תיאור</div>
      <input class="inp" id="expD" placeholder="למשל: סופר, תדלוק, קפה..." style="margin-bottom:14px" value="${_desc.replace(/"/g,'&quot;')}"/>
      <div style="display:flex;gap:10px;margin-bottom:14px">
        <div style="flex:1">
          <div style="font-size:11px;font-weight:600;color:#94a3b8;margin-bottom:5px;letter-spacing:.5px">סכום &#8362;</div>
          <input class="inp" id="expA" type="number" placeholder="0" style="font-size:22px;font-weight:800;color:#6366f1;text-align:center" value="${_amt}"/>
        </div>
        <div style="flex:1">
          <div style="font-size:11px;font-weight:600;color:#94a3b8;margin-bottom:5px;letter-spacing:.5px">תאריך</div>
          <input class="inp" id="expDt" type="date" value="${_date}"/>
        </div>
      </div>
      <div style="display:flex;gap:10px;align-items:flex-end;margin-bottom:14px">
        <div style="flex:1">
          <div style="font-size:11px;font-weight:600;color:#94a3b8;margin-bottom:5px;letter-spacing:.5px">תשלומים</div>
          <input class="inp" id="expInst" type="number" min="1" max="60" placeholder="1" style="text-align:center;font-size:18px;font-weight:700;color:#6366f1" value="${_inst}"/>
        </div>
        <div style="flex:2;padding-bottom:2px;font-size:11px;color:#94a3b8;line-height:1.5">פיצול לחודשים עוקבים<br/>(1 = ללא פיצול)</div>
      </div>
      <label style="display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:12px;background:#f8faff;border:1px solid #e2e8f0;cursor:pointer;margin-bottom:16px">
        <input type="checkbox" id="expRec" style="width:18px;height:18px;accent-color:#6366f1;flex-shrink:0" ${_rec?'checked':''}/>
        <div style="flex:1">
          <div style="font-size:13px;font-weight:700;color:#1e293b">הוצאה קבועה</div>
          <div style="font-size:11px;color:#94a3b8">תתוסף אוטומטית לכל החודשים</div>
        </div>
        <span style="font-size:22px">&#128260;</span>
      </label>
      <button id="expSave" style="width:100%;padding:13px;border-radius:12px;border:none;color:#fff;font-weight:800;font-size:15px;background:linear-gradient(135deg,#6366f1,#8b5cf6);cursor:pointer;box-shadow:0 4px 14px rgba(99,102,241,.3)">שמור הוצאה</button>
    </div></div>`);
    g("cExp").onclick=()=>ih("m1","");
    g("expO").onclick=e=>{if(e.target.id==="expO")ih("m1","");};
    g("expSave").onclick=()=>{
      const a=parseFloat(g("expA").value);
      if(!a){g("expA").focus();return;}
      if(!selCat)return;
      const desc=(g("expD").value||"").trim();
      const date=g("expDt").value||today();
      const isRec=g("expRec").checked;
      const inst=Math.max(1,parseInt(g("expInst").value)||1);
      const baseId=Date.now();
      const subCat=selSub||null;
      if(isRec){
        for(let m=S.month;m<12;m++){
          S.mData[m][selCat].entries.push({id:baseId+m*1000,desc,amount:a,date:adjDate(date,m,S.year),recurring:true,subCat});
        }
        sv();
        applyToFutureYears(baseId,selCat,(entries,relId,m,fy)=>{
          if(entries.some(e=>e.id===relId))return undefined;
          return[...entries,{id:relId,desc,amount:a,date:adjDate(date,m,fy),recurring:true,subCat}];
        });
      } else if(inst>1){
        const perMonth=Math.round(a/inst*100)/100;
        for(let i=0;i<inst;i++){
          const tMonth=(S.month+i)%12;
          const tYear=S.year+Math.floor((S.month+i)/12);
          const entryDate=adjDate(date,tMonth,tYear);
          const entryDesc=desc?(desc+' ('+(i+1)+'/'+inst+')'):(''+(i+1)+'/'+inst);
          if(tYear===S.year){
            if(!S.mData[tMonth])S.mData[tMonth]={};
            if(!S.mData[tMonth][selCat])S.mData[tMonth][selCat]={entries:[]};
            S.mData[tMonth][selCat].entries.push({id:baseId+i*1000,desc:entryDesc,amount:perMonth,date:entryDate,recurring:false,subCat});
          } else {
            const fKey='bdg_v4_'+CUR_UID+'_'+tYear;
            let fData=JSON.parse(localStorage.getItem(fKey)||'{}');
            if(!fData[tMonth])fData[tMonth]={};
            if(!fData[tMonth][selCat])fData[tMonth][selCat]={entries:[]};
            fData[tMonth][selCat].entries.push({id:baseId+i*1000,desc:entryDesc,amount:perMonth,date:entryDate,recurring:false,subCat});
            localStorage.setItem(fKey,JSON.stringify(fData));
          }
        }
        sv();
      } else {
        S.mData[S.month][selCat].entries.push({id:baseId,desc,amount:a,date,recurring:false,subCat});
        sv();
      }
      ih("m1","");rMon();
    };
    g("expA").onkeydown=e=>{if(e.key==="Enter")g("expSave").click();};
    document.querySelectorAll(".expCat").forEach(b=>b.onclick=()=>{
      _desc=(g("expD")?.value||"");_amt=(g("expA")?.value||"");_date=(g("expDt")?.value||today());_rec=(g("expRec")?.checked||false);_inst=parseInt(g("expInst")?.value)||1;
      selCat=parseInt(b.dataset.c);selSub=null;build();
      requestAnimationFrame(()=>{const el=g("expA");if(el)el.focus();});
    });
    document.querySelectorAll(".expSub").forEach(b=>b.onclick=()=>{
      _desc=(g("expD")?.value||"");_amt=(g("expA")?.value||"");_date=(g("expDt")?.value||today());_rec=(g("expRec")?.checked||false);_inst=parseInt(g("expInst")?.value)||1;
      const sid=parseInt(b.dataset.s);selSub=selSub===sid?null:sid;build();
    });
  }
  build();
}

      sv();
      applyToFutureYears(bid,S.aCat,(entries,relId,m,fy)=>{

        return entries.map(e=>e.id===relId?{...e,desc,amount:a,date:adjDate(date,m,fy),subCat}:e);
      });

      S.mData[S.month][S.aCat].entries=S.mData[S.month][S.aCat].entries.map(e=>e.id===id?{...e,desc,amount:a,date,subCat}:e);
      sv();
    }
    S.editEntId=null;rEntMod();
  });
  document.querySelectorAll(".dEn").forEach(b=>b.onclick=()=>{
    const id=parseInt(b.dataset.e);
    const entry=S.mData[S.month][S.aCat].entries.find(e=>e.id===id);
    if(entry?.recurring){
      const bid=id-S.month*1000;
      for(let m=S.month;m<12;m++){
        const relId=bid+m*1000;
        if(S.mData[m]?.[S.aCat])S.mData[m][S.aCat].entries=S.mData[m][S.aCat].entries.filter(e=>e.id!==relId);
      }
      sv();
      applyToFutureYears(bid,S.aCat,(entries,relId)=>{
        if(!entries.some(e=>e.id===relId))return undefined;
        return entries.filter(e=>e.id!==relId);
      });
    }else{
      S.mData[S.month][S.aCat].entries=S.mData[S.month][S.aCat].entries.filter(e=>e.id!==id);
      sv();
    }
    rEntMod();
  });
}

function doCSV(){
  let csv="﻿";
  for(let m=0;m<12;m++){
    csv+="\n"+MO[m]+" "+S.year+"\n";
    const inc=S.mData[m]?.income||[];
    if(inc.length){csv+="הכנסות\n";inc.forEach(e=>{csv+=(e.date||"")+","+(e.desc||"")+","+e.amount+"\n";});}
    csv+="קטגוריה,תקציב,הוצאה,יתרה,סטטוס,פירוט\n";
    S.cats.forEach(c=>{
      const ent=S.mData[m]?.[c.id]?.entries||[];
      const tot=ent.reduce((s,e)=>s+(parseFloat(e.amount)||0),0);
      const det=ent.map(e=>(e.recurring?'[q] ':'')+( e.date?e.date+" ":"")+( e.desc?e.desc+":":"")+e.amount).join(" | ");
      csv+=c.name+","+c.budget+","+tot+","+(c.budget-tot)+","+(c.budget>0&&tot>c.budget?"חריגה":"תקין")+",\""+det+"\"\n";
    });
    csv+="סה\"כ,,"+mt(m)+",,,\n";
  }
  const bl=new Blob([csv],{type:"text/csv;charset=utf-8"});
  const a=document.createElement("a");a.href=URL.createObjectURL(bl);a.download="תקציב_"+S.year+".csv";a.click();
}

const cntEl=document.getElementById("cnt");
cntEl.addEventListener("touchstart",e=>{touchStartX=e.touches[0].clientX;touchStartY=e.touches[0].clientY;touchStartTarget=e.target;},{passive:true});
cntEl.addEventListener("touchend",e=>{
  if(S.view!=="monthly")return;
  const cc2=document.getElementById("chartCarousel");
  if(cc2&&(cc2.contains(touchStartTarget)||(touchStartTarget&&!document.body.contains(touchStartTarget))))return;
  const dx=touchStartX-e.changedTouches[0].clientX,dy=Math.abs(touchStartY-e.changedTouches[0].clientY);
  if(Math.abs(dx)>60&&dy<80){
    if(dx>0){if(S.month===0){S.month=11;S.year--;ld();fbListen(S.year);}else{S.month--;}}
    else{if(S.month===11){S.month=0;S.year++;ld();fbListen(S.year);}else{S.month++;}}
    rAll();
  }
},{passive:true});

    b.style.cssText='position:fixed;top:0;left:0;right:0;background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;padding:10px 16px;z-index:9999;display:flex;align-items:center;gap:10px;justify-content:center;direction:rtl;font-size:13px;font-weight:600;box-shadow:0 2px 12px rgba(99,102,241,.3)';
    b.innerHTML='<span>&#128260; גרסה חדשה זמינה!</span><button onclick="location.reload()" style="padding:5px 14px;border-radius:8px;border:none;background:#fff;color:#6366f1;font-weight:700;cursor:pointer;font-size:12px">עדכן עכשיו</button><button onclick="this.parentElement.remove()" style="background:transparent;border:none;color:rgba(255,255,255,.7);font-size:22px;cursor:pointer;padding:0;line-height:1">&times;</button>';
    document.body.prepend(b);
  });
}

    try{db=m.initializeFirestore(fbApp,{localCache:m.persistentLocalCache()});}
    catch(e){db=m.getFirestore(fbApp);}
    _doc=m.doc;_setDoc=m.setDoc;_onSnapshot=m.onSnapshot;_getDoc=m.getDoc;
    fbLoadUsers();
    fbListen(S.year);
  }catch(e){

    setSyncDot(false);
  }
})();
